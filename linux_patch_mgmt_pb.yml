# ------------------------------------------------------------------------------                                                                             ----------------
# Linux Patch Management Playbook
#
# Objective:
# Automate Linux patch management across RHEL/Alma/Rocky/Ubuntu hosts
# with pre-check validation, safe package updates, reboot handling,
# post-patch health checks, and centralized reporting.
# ------------------------------------------------------------------------------                                                                             ----------------

---
- name: Ansible Patch Management
  hosts: all
  gather_facts: true

  vars:
    min_disk_free_mb: 5120

  tasks:

    - name: ping check
      ping:
      register: ping_result
      failed_when: ping_result.ping != "pong"

    - name: Get OS Info
      shell: uname -r
      register: server_os
      changed_when: false

    - name: Get Users
      shell: "getent passwd | cut -d: -f1"
      register: users_list
      changed_when: false

    - name: Get Active Users
      shell: w -h | awk '{print $1}' | sort -u
      register: active_users
      changed_when: false

    - name: Get disk space on root partition
      shell: df --output=avail -m / | tail -1 | tr -d ' '
      register: disk_free_mb
      changed_when: false

    - name: Check system's CPU load average
      shell: awk '{print $1}' /proc/loadavg
      register: load_avg
      changed_when: false

    - name: Set dynamic CPU load threshold
      set_fact:
        max_load_threshold: "{{ ansible_facts['processor_vcpus'] | float }}"

    - name: Warn if CPU's load average is high
      debug:
        msg: >
          WARNING: {{ inventory_hostname }} has a 1-min CPU load of {{ load_avg.                                                                             stdout }},
          which exceeds threshold {{ max_load_threshold }}. Proceeding with caut                                                                             ion.
      when: load_avg.stdout | float > max_load_threshold | float

    - name: Abort if disk space is insufficient
      fail:
        msg: >
          {{ inventory_hostname }}: Only {{ disk_free_mb.stdout }} Mb free on /.
          Minimum required: {{ min_disk_free_mb }} Mb. Aborting patch run.
      when: disk_free_mb.stdout | int < min_disk_free_mb | int

    - name: Display Status
      debug:
        msg: >
          {{ inventory_hostname.upper() }} OS detail is {{ server_os.stdout }}
            DISk_SPACE={{ disk_free_mb.stdout }} Mb
            USERS={{ users_list.stdout_lines | join(', ') }}
            ACTIVE_USERS={{ active_users.stdout_lines | join(', ')}}

    - name: Synchronize system time
      become: true
      shell: |
        chronyc makestep
        hwclock --systohc
        timedatectl
      register: time_sync
      changed_when: false
      tags: time_sync

    - name: Report time synchronization results
      debug:
        msg: |
          HOST={{ inventory_hostname.upper() }}
          TIME_SYNC_FAILED={{ time_sync.failed | default(false) }}
          TIME_SYNC_RC={{ time_sync.rc | default('N/A') }}

          TIME_SYNC_OUTPUT:
          {{ time_sync.stdout_lines | default([]) | join('\n') }}

          TIME_SYNC_ERRORS:
          {{ time_sync.stderr_lines | default([]) | join('\n') }}
      tags: time_sync

    - name: Update cache and upgrade packages
      become: true
      apt:
        name: "*"
        state: latest
        update_cache: yes
        force_apt_get: yes
      register: update_cmds
      timeout: 300
      ignore_errors: yes
      when: ansible_facts["os_family"] == "Debian"
      tags: apt_repair

    - name: Check and refresh Ubuntu's SNAP packages
      become: true
      shell: snap refresh
      register: snap_update_cmds
      timeout: 300
      ignore_errors: yes
      when: ansible_facts["distribution"] == "Ubuntu"
      tags: snap_repair

    - name: Get package list on Debian hosts
      shell: "dpkg-query -W -f='${binary:Package} ${Version}, '"
      register: debian_packages
      changed_when: false
      when: ansible_facts["os_family"] == "Debian"

    - name: Get package list on RedHat hosts
      shell: "rpm -qa | paste -sd','"
      register: redhat_packages
      changed_when: false
      when: ansible_facts["os_family"] == "RedHat"

    - name: Refresh DNF package metadata
      shell: dnf makecache
      become: true
      changed_when: false
      register: dnf_cache_update
      timeout: 300
      when: ansible_facts["os_family"] == "RedHat"
      tags: dnf_repair

    - name: Upgrade all DNF packages
      shell: dnf upgrade -y
      become: true
      changed_when: false
      register: dnf_upgrade
      timeout: 500
      when: ansible_facts["os_family"] == "RedHat"
      tags: dnf_repair

    - name: Report APT package maintenance results
      debug:
        var: update_cmds.stdout_lines
      when: ansible_facts["os_family"] == "Debian"

    - name: Report DNF package maintenance results
      debug:
        msg: |
          DNF_CACHE_UPDATE: {{ dnf_cache_update.stdout_lines | join(', ') }}
          DNF_UPGRADE: {{ dnf_upgrade.stdout_lines | join(', ') }}
      when: ansible_facts["os_family"] == "RedHat"
      tags: dnf_repair
